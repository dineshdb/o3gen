[package]
name = "o3gen-openai"
version = "0.2.0"
edition = "2024"
description = "OpenAI API client generated from the OpenAPI spec using o3gen"
license = "MIT"
readme = "../../README.md"
repository = "https://github.com/dineshdb/o3gen"
keywords = ["openai", "openapi", "generator", "client"]
categories = ["api-bindings", "web-programming::http-client"]

[dependencies]
derive_builder = "0.20.2"
derive_more = { version = "2.1.1", features = ["display", "from"] }
eventsource-stream = "0.2"
futures-util = "0.3"
reqwest = { version = "0.13", default-features = false, features = ["json", "query", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
strum = { version = "0.28.0", features = ["derive"] }
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread"] }
validator = { version = "0.20.0", features = ["derive"] }

[build-dependencies]
o3gen = { version = "0.7.0", path = "../o3gen" }

[dev-dependencies]
mockito = "1.7.2"
serde_json = "1.0"
